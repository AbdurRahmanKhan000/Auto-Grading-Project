spring.application.name=oop-studio-lms

# Local/offline datasource by default. Override DB_URL, DB_USERNAME,
# DB_PASSWORD, and DB_DRIVER to point the app at MySQL when needed.
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/oop_studio_lms;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA / Hibernate development settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
spring.jpa.defer-datasource-initialization=true

# SQL baseline data loading
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# Web / template development behavior
server.port=8080
spring.thymeleaf.cache=false
